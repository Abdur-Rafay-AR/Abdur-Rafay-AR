<svg width="480" height="210" viewBox="0 0 480 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub activity">
    <defs>
        <linearGradient id="cardGradAct" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#282828"/>
            <stop offset="100%" stop-color="#1d2021"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
        </filter>
    </defs>
    <style>
        .card-bg { fill: url(#cardGradAct); stroke: #3c3836; stroke-width: 1.5px; }
        .header { font: 700 22px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fe8019; }
        .stat-label { font: 500 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a89984; }
        .stat-value { font: 700 26px 'Segoe UI', Ubuntu, Sans-Serif; }
        .sub-card { fill: #32302f; filter: url(#shadow); }
        .tile { opacity: 0; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
    <rect x="0.75" y="0.75" rx="12" height="208.5" width="478.5" class="card-bg"/>
    <text x="24" y="42" class="header">⚡ GitHub Activity</text>
    
        <g transform="translate(24, 74)" class="tile" style="animation-delay:0.15s">
            <rect width="133.33" height="108" rx="8" class="sub-card"/>
            <rect width="133.33" height="3" rx="1.5" fill="#8ec07c"/>
            <text x="66.67" y="34" class="stat-label" text-anchor="middle">📦 Total</text>
            <text x="66.67" y="52" class="stat-label" text-anchor="middle">Contributions</text>
            <text x="66.67" y="88" class="stat-value" text-anchor="middle" style="fill:#8ec07c">1804</text>
        </g>
        <g transform="translate(173.33, 74)" class="tile" style="animation-delay:0.3s">
            <rect width="133.33" height="108" rx="8" class="sub-card"/>
            <rect width="133.33" height="3" rx="1.5" fill="#fabd2f"/>
            <text x="66.67" y="34" class="stat-label" text-anchor="middle">🔥 Current</text>
            <text x="66.67" y="52" class="stat-label" text-anchor="middle">Streak</text>
            <text x="66.67" y="88" class="stat-value" text-anchor="middle" style="fill:#fabd2f">30</text>
        </g>
        <g transform="translate(322.66, 74)" class="tile" style="animation-delay:0.45s">
            <rect width="133.33" height="108" rx="8" class="sub-card"/>
            <rect width="133.33" height="3" rx="1.5" fill="#fb4934"/>
            <text x="66.67" y="34" class="stat-label" text-anchor="middle">🏆 Longest</text>
            <text x="66.67" y="52" class="stat-label" text-anchor="middle">Streak</text>
            <text x="66.67" y="88" class="stat-value" text-anchor="middle" style="fill:#fb4934">30</text>
        </g>
</svg>